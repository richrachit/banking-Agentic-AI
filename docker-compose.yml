services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banking_ai
      POSTGRES_USER: banking_ai
      POSTGRES_PASSWORD: change-me-before-use
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
volumes:
  postgres_data:
